<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1420"/>
      <stop offset="100%" style="stop-color:#131c2e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8a020"/>
      <stop offset="100%" style="stop-color:#c08a14"/>
    </linearGradient>
    <radialGradient id="glow" cx="75%" cy="20%" r="50%">
      <stop offset="0%" style="stop-color:#c08a14;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#0d1420;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Blueprint grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#1e3a5a" stroke-width="0.8"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#1e3a5a" stroke-width="0.8"/>
  <line x1="0" y1="157" x2="1200" y2="157" stroke="#192e48" stroke-width="0.4"/>
  <line x1="0" y1="472" x2="1200" y2="472" stroke="#192e48" stroke-width="0.4"/>
  <line x1="300" y1="0" x2="300" y2="630" stroke="#192e48" stroke-width="0.4"/>
  <line x1="900" y1="0" x2="900" y2="630" stroke="#192e48" stroke-width="0.4"/>

  <!-- Logo mark - Blueprint Grid - top left -->
  <rect x="72" y="60" width="56" height="56" rx="10" fill="#0d1a2e" stroke="#e8a020" stroke-width="1.5"/>
  <line x1="100" y1="62" x2="100" y2="114" stroke="#1e3a5a" stroke-width="0.8"/>
  <line x1="74" y1="90" x2="126" y2="90" stroke="#1e3a5a" stroke-width="0.8"/>
  <polygon points="100,68 118,90 100,112 82,90" fill="none" stroke="#e8a020" stroke-width="1.8"/>
  <polygon points="100,77 109,90 100,103 91,90" fill="rgba(232,168,32,0.1)" stroke="#e8a020" stroke-width="1"/>
  <line x1="100" y1="62" x2="100" y2="70" stroke="#e8a020" stroke-width="2.5"/>
  <circle cx="100" cy="90" r="3.5" fill="#e8a020"/>

  <!-- Brand name -->
  <text x="144" y="84" font-family="Georgia,serif" font-size="18" font-weight="700" fill="#f0ebe0">Career</text>
  <text x="144" y="106" font-family="Georgia,serif" font-size="18" font-weight="700" fill="#e8a020">Blueprint</text>

  <!-- Tagline pill -->
  <rect x="72" y="134" width="280" height="28" rx="14" fill="rgba(232,168,32,0.1)" stroke="rgba(232,168,32,0.3)" stroke-width="1"/>
  <text x="212" y="153" font-family="Arial,sans-serif" font-size="11" font-weight="600" fill="#e8a020" text-anchor="middle" letter-spacing="2">SCIENTIFIC CAREER FRAMEWORK</text>

  <!-- Main headline -->
  <text x="72" y="260" font-family="Georgia,serif" font-size="58" font-weight="700" fill="#f0ebe0" letter-spacing="-1">The wrong degree</text>
  <text x="72" y="330" font-family="Georgia,serif" font-size="58" font-weight="700" fill="#f0ebe0" letter-spacing="-1">costs <tspan fill="#e8a020">₹40 Lakh</tspan> and</text>
  <text x="72" y="400" font-family="Georgia,serif" font-size="58" font-weight="700" fill="#f0ebe0" letter-spacing="-1">4 years you never</text>
  <text x="72" y="470" font-family="Georgia,serif" font-size="58" font-weight="700" fill="#f0ebe0" letter-spacing="-1">get back.</text>

  <!-- Sub text -->
  <text x="72" y="530" font-family="Arial,sans-serif" font-size="20" fill="#8090a8">12-minute diagnostic · OCEAN + RIASEC · AI-generated report</text>

  <!-- Right side - 3 stat cards -->
  <!-- Card 1 -->
  <rect x="780" y="180" width="340" height="100" rx="12" fill="#1a2540" stroke="#e8a020" stroke-width="1"/>
  <text x="800" y="218" font-family="Arial,sans-serif" font-size="11" fill="#8090a8" letter-spacing="1.5">FIT SCORE</text>
  <text x="800" y="258" font-family="Georgia,serif" font-size="36" font-weight="700" fill="#e8a020">95%</text>
  <text x="870" y="258" font-family="Arial,sans-serif" font-size="14" fill="#c8c0b0"> personality–career match</text>

  <!-- Card 2 -->
  <rect x="780" y="300" width="340" height="100" rx="12" fill="#1a2540" stroke="#22907a" stroke-width="1"/>
  <text x="800" y="338" font-family="Arial,sans-serif" font-size="11" fill="#8090a8" letter-spacing="1.5">DELIVERY</text>
  <text x="800" y="378" font-family="Georgia,serif" font-size="36" font-weight="700" fill="#22907a">7 min</text>
  <text x="878" y="378" font-family="Arial,sans-serif" font-size="14" fill="#c8c0b0"> report after payment</text>

  <!-- Card 3 -->
  <rect x="780" y="420" width="340" height="100" rx="12" fill="#1a2540" stroke="#e8a020" stroke-width="1"/>
  <text x="800" y="458" font-family="Arial,sans-serif" font-size="11" fill="#8090a8" letter-spacing="1.5">PRICE</text>
  <text x="800" y="498" font-family="Georgia,serif" font-size="36" font-weight="700" fill="#e8a020">₹199</text>
  <text x="872" y="498" font-family="Arial,sans-serif" font-size="14" fill="#c8c0b0"> launch price</text>

  <!-- Bottom domain -->
  <text x="72" y="590" font-family="Arial,sans-serif" font-size="15" fill="#4a6080">career.realplannet.com</text>

  <!-- Bottom right - domain accent line -->
  <line x1="780" y1="570" x2="1120" y2="570" stroke="rgba(232,168,32,0.2)" stroke-width="1"/>
  <text x="1120" y="592" font-family="Arial,sans-serif" font-size="13" fill="#4a6080" text-anchor="end">Powered by realplannet.com</text>
</svg>